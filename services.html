<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Portfolio</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
    }

    header {
      background: #111;
      color: white;
      text-align: center;
      padding: 40px 20px;
    }

    main {
      max-width: 1000px;
      margin: 40px auto;
      padding: 20px;
    }

    section {
      margin-bottom: 60px;
    }

    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    article {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #111;
      color: white;
    }
  </style>
</head>

<body>

  <header>
    <h1>Emmanuel Tagle</h1>
    <p>Web Developer</p>
  </header>

  <main>

    <!-- About Section -->
    <section>
      <h2>About Me</h2>
      <p>I am learning HTML, CSS, and building modern websites.</p>
    </section>

    <!-- Projects Section -->
    <section>
      <h2>Projects</h2>

      <div class="projects">

        <article>
          <h3>Profile Website</h3>
          <p>A simple personal website using HTML and CSS.</p>
        </article>

        <article>
          <h3>Tech Background Design</h3>
          <p>Futuristic blue and orange background design.</p>
        </article>

      </div>
    </section>

  </main>

  <footer>
    © 2026 Emmanuel Tagle
  </footer>

</body>
</html>
